<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="전국 테니스 대회 일정과 접수 정보를 한눈에 확인하는 서비스입니다.">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <title>대회있음? | 테니스 대회 조회</title>
  <link rel="stylesheet" href="./styles.css">
  <script type="module" src="./app.js"></script>
</head>
<body>
  <header class="top-nav">
    <a class="brand" href="./" aria-label="대회있음 홈">
      <span class="brand-ball"></span>
      <strong>대회있음?</strong>
      <em>전국 테니스 대회 일정</em>
    </a>
    <nav class="product-tabs" aria-label="서비스 전환">
      <a class="product-tab is-active" href="./"><span class="app-icon daehoe-icon" aria-hidden="true"></span>대회있음?</a>
      <a class="product-tab" href="/"><span class="app-icon court-icon" aria-hidden="true"></span>코트있음?</a>
    </nav>
    <div class="nav-actions" aria-label="사용자 메뉴">
      <button type="button" aria-label="알림">♡</button>
      <button type="button" aria-label="즐겨찾기">☆</button>
      <button class="avatar" type="button" aria-label="내 정보"></button>
      <span>MY</span>
    </div>
  </header>

  <main class="app-shell">
    <section class="hero-board">

      <section class="filters" aria-label="대회 필터">
        <label>
          <span class="filter-icon">⚭</span>
          <small>성별</small>
          <select id="profileGender">
            <option value="">전체</option>
            <option value="male">남자</option>
            <option value="female">여자</option>
            <option value="mixed">혼합복식</option>
          </select>
        </label>
        <label>
          <span class="filter-icon">◌</span>
          <small>복식</small>
          <select id="profileFormat">
            <option value="">전체</option>
            <option value="singles">단식</option>
            <option value="doubles">복식</option>
            <option value="mixed">혼합복식</option>
          </select>
        </label>
        <label>
          <span class="filter-icon">▥</span>
          <small>레벨</small>
          <select id="profileLevel">
            <option value="">전체</option>
            <option value="화이트">화이트</option>
            <option value="아이언">아이언</option>
            <option value="브론즈">브론즈</option>
            <option value="실버">실버</option>
            <option value="골드">골드</option>
            <option value="신인">신인</option>
            <option value="개나리">개나리</option>
            <option value="국화">국화</option>
            <option value="오픈">오픈</option>
          </select>
        </label>
        <label>
          <span class="filter-icon">⌖</span>
          <small>지역</small>
          <select id="regionFilter"></select>
        </label>
        <label class="search-field">
          <span class="filter-icon">⌕</span>
          <small>검색</small>
          <input id="keywordFilter" type="search" placeholder="대회명·주최·지역 검색" autocomplete="off">
        </label>
        <label>
          <span class="filter-icon">⌂</span>
          <small>주체</small>
          <select id="organizerFilter"></select>
        </label>
        <label>
          <span class="filter-icon">▣</span>
          <small>부서</small>
          <select id="divisionFilter"></select>
        </label>
        <label>
          <span class="filter-icon">◐</span>
          <small>일정</small>
          <select id="dateTypeFilter">
            <option value="">전체 일정</option>
            <option value="weekend">주말</option>
            <option value="weekday">평일</option>
          </select>
        </label>
        <label class="week-field">
          <span class="filter-icon">▤</span>
          <small>주차</small>
          <select id="weekFilter">
            <option value="">전체 주차</option>
            <option value="1">1주차</option>
            <option value="2">2주차</option>
            <option value="3">3주차</option>
            <option value="4">4주차</option>
            <option value="5">5주차</option>
          </select>
        </label>
        <button class="reset-btn" type="button" onclick="location.reload()">↻ 필터 초기화</button>
        <select id="sourceFilter" class="visually-hidden" aria-label="데이터 출처">
          <option value="">전체 데이터</option>
          <option value="tennistown">테니스타운 앱</option>
          <option value="official">공식/협회 사이트</option>
        </select>
        <select id="profileYears" class="visually-hidden" aria-label="구력">
          <option value="">상관없음</option>
        </select>
      </section>

      <section id="recommendPanel" class="recommend-panel" aria-live="polite"></section>
      <section id="dataStats" class="data-stats" aria-live="polite"></section>

      <section id="calendarView" class="view is-active">
        <div class="month-command">
          <div>
            <div class="month-picker">
              <select id="yearSelect" aria-label="연도 선택"></select>
              <select id="monthSelect" aria-label="월 선택"></select>
              <button id="prevMonthBtn" class="icon-btn" type="button" aria-label="이전 달">‹</button>
              <button id="nextMonthBtn" class="icon-btn" type="button" aria-label="다음 달">›</button>
              <button class="today-btn" type="button" onclick="location.reload()">오늘</button>
            </div>
            <p id="monthSummary" class="month-summary"></p>
          </div>

          <section class="view-tabs segmented" aria-label="화면 전환">
            <button class="tab is-active" data-view="calendar" type="button">캘린더</button>
            <button class="tab" data-view="list" type="button">목록</button>
          </section>
        </div>
        <div class="dashboard-grid">
          <div class="calendar-panel">
            <div id="calendarList" class="calendar-list"></div>
          </div>
          <aside class="list-panel">
            <div class="list-head">
              <h2 id="listTitle">대회 목록</h2>
              <select aria-label="정렬">
                <option>접수마감 임박순</option>
                <option>날짜 빠른순</option>
              </select>
            </div>
            <div id="tournamentList" class="tournament-list"></div>
          </aside>
        </div>
      </section>

      <section id="listView" class="view">
        <div class="list-head full">
          <h2>대회 목록</h2>
        </div>
      </section>
    </section>
  </main>

  <aside id="detailPanel" class="detail-panel" aria-live="polite" aria-label="대회 상세"></aside>
</body>
</html>
